# ─── Backlog Toolkit Infrastructure ──────────────────────────────────
# Phase 1: postgres, litellm, rag (always started)
# Phase 2: memgraph, memgraph-lab (start with --profile phase2)
#
# Usage:
#   docker compose --env-file .env.docker.local up -d
#   docker compose --env-file .env.docker.local --profile phase2 up -d
#
# Docs: docs/SERVICE-STARTUP-GUIDE.md

services:
  # ─── PostgreSQL (LiteLLM persistence) ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: backlog-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-litellm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-litellm_pass}
      POSTGRES_DB: ${POSTGRES_DB:-litellm}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-litellm}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─── LiteLLM Proxy ────────────────────────────────────────────────
  litellm:
    # Fork: github.com/fjbelchi/litellm (main branch)
    # Contains upstream main (includes PR #21706 Prisma health watchdog) +
    # cherry-pick of PR #21899 (Prisma zombie process recovery via waitpid).
    # Built automatically by .github/workflows/fork-build.yml on push to main.
    # Pricing regressions are mitigated by the patched pricing file mount below.
    image: ghcr.io/fjbelchi/litellm:main
    container_name: backlog-litellm
    labels:
      autoheal: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://litellm:litellm_pass@postgres:5432/litellm}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-litellm-changeme}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:-sk-salt-changeme}
      # AWS credentials resolved at runtime by start-services.sh
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      # Ollama host for local model routing (host.docker.internal resolves to host machine)
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      # Store model info and spend logs in DB (required for prompt logging in UI)
      STORE_MODEL_IN_DB: "True"
      # Use local model cost map (don't fetch from GitHub — blocked by Zscaler SSL)
      LITELLM_LOCAL_MODEL_COST_MAP: "true"
      # SSL verification disabled — corporate TLS inspection (Zscaler) uses a CA cert
      # that Python 3.13 rejects (Basic Constraints not marked critical per RFC 5280).
      SSL_VERIFY: "False"
      PYTHONPATH: /app/callbacks
      CURL_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
      REQUESTS_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
    ports:
      - "8000:4000"
    volumes:
      - ./config/litellm/proxy-config.docker.yaml:/app/config.yaml:ro
      # Mount patched pricing to BOTH locations:
      # 1. /app/litellm/...backup.json — read by litellm.model_cost at import time
      # 2. /app/model_prices_and_context_window.json — read by proxy startup during
      #    register_model(). Without this, the image's stale primary file causes $0
      #    spend for models not in the image's built-in pricing (e.g. Sonnet 4.6).
      - ./config/litellm/model_prices_patched.json:/app/litellm/model_prices_and_context_window_backup.json:ro
      - ./config/litellm/model_prices_patched.json:/app/model_prices_and_context_window.json:ro
      - ./docker/certs/ca-bundle.crt:/etc/ssl/certs/ca-certificates.crt:ro
      - ./config/litellm/callbacks:/app/callbacks:ro
      - ./config/litellm/callbacks/ticket_tagger.py:/app/ticket_tagger.py:ro
      - ./config/litellm/fix_pricing_on_startup.py:/app/fix_pricing_on_startup.py:ro
      - ${HOME}/.backlog-toolkit:/root/.backlog-toolkit:ro
    command: ["--config", "/app/config.yaml", "--detailed_debug"]
    healthcheck:
      # Two-phase health check:
      # 1. fix_pricing_on_startup.py — verifies non-zero pricing via /model/info (startup)
      # 2. /health/readiness — verifies Prisma (DB) is alive (ongoing)
      #
      # Why both: /model/info succeeds even when the Prisma query engine is a zombie.
      # /health/readiness returns 503 when Prisma is dead, enabling autoheal/restart.
      #
      # start_period: 90s gives LiteLLM time to run migrations + register models.
      # After start_period, 3 consecutive failures → container marked unhealthy.
      test: ["CMD-SHELL", "python3 /app/fix_pricing_on_startup.py && python3 -c \"import urllib.request,sys; urllib.request.urlopen('http://localhost:4000/health/readiness', timeout=5)\" 2>/dev/null"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 90s
    restart: unless-stopped

  # ─── RAG Server (code search) ─────────────────────────────────────
  rag:
    build:
      context: .
      dockerfile: docker/rag/Dockerfile
    container_name: backlog-rag
    environment:
      REQUESTS_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
    ports:
      - "8001:8001"
    volumes:
      - chromadata:/data/chroma
      - ~/.cache/huggingface:/root/.cache/huggingface:cached
      - ./docker/certs/ca-bundle.crt:/etc/ssl/certs/ca-certificates.crt:ro
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8001/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ─── Redis (LiteLLM semantic cache) ──────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: backlog-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─── Autoheal (restart unhealthy containers) ──────────────────────
  # Required because Docker's restart policy only triggers on process exit,
  # not on healthcheck failure. Autoheal watches for unhealthy containers
  # and restarts them. Targets only containers with label autoheal=true.
  autoheal:
    image: willfarrell/autoheal:latest
    container_name: backlog-autoheal
    restart: unless-stopped
    environment:
      AUTOHEAL_CONTAINER_LABEL: autoheal
      AUTOHEAL_INTERVAL: 30
      AUTOHEAL_START_PERIOD: 120
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  # ─── Memgraph (Phase 2: code graph analysis) ──────────────────────
  memgraph:
    image: memgraph/memgraph-mage
    container_name: backlog-memgraph
    profiles:
      - phase2
    ports:
      - "7687:7687"
      - "7444:7444"
    volumes:
      - memgraphdata:/var/lib/memgraph
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1;' | mgconsole --host localhost --port 7687 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ─── Memgraph Lab (Phase 2: graph visualization) ──────────────────
  memgraph-lab:
    image: memgraph/lab
    container_name: backlog-memgraph-lab
    profiles:
      - phase2
    depends_on:
      memgraph:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      QUICK_CONNECT_MG_HOST: memgraph
      QUICK_CONNECT_MG_PORT: 7687
    restart: unless-stopped

volumes:
  pgdata:
  chromadata:
  memgraphdata:
  redisdata:
